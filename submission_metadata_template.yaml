# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture design, debugging, and
  iteration on the JD-parsing and semantic-scoring logic, including catching
  and fixing two real bugs (a section-splitting error that let a Computer
  Vision Engineer rank #1 against an explicit JD disqualifier, and a
  miscalibrated disqualifier-similarity threshold that flagged nearly every
  candidate). All architectural decisions, validation, and final review were
  done by VectorOne. No candidate data was sent to any external LLM API
  — the ranking pipeline itself makes no network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  JD-agnostic hybrid ranker. At runtime, the JD is parsed into four semantic
  segments (requirements, disqualifiers, ideal-profile, logistics) via
  heading-cue detection — no hardcoded skill/role lists. A TF-IDF + Truncated
  SVD (LSA) model is fit jointly across the JD segments and all 100K
  candidate text blobs (headline, summary, career history, skills), giving
  genuine semantic similarity rather than keyword overlap; disqualifier
  similarity is subtracted from the fit score. This is re-ranked by a
  behavioral availability multiplier (response rate, activity recency,
  interview completion), career-pattern heuristics (consulting-only career,
  job-hopping), and JD-derived logistics fit (location, notice period). A
  data-integrity check (experience/timeline mismatches, impossible
  proficiency claims) excludes honeypots entirely. Fully CPU-only, no
  network, no pretrained model downloads; runs on 100K candidates in under
  90 seconds.

